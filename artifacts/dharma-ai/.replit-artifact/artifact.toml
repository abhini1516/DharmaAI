kind = "web"
previewPath = "/"
title = "Dharma.ai"
version = "1.0.0"
id = "artifacts/dharma-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22805

[services.development]
run = "pnpm --filter @workspace/dharma-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dharma-ai", "run", "build" ]
publicDir = "artifacts/dharma-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22805"
BASE_PATH = "/"
